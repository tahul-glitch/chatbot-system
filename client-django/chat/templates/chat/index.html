<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chat Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* --- TEMA TERANG & GELAP (CSS VARIABLES) --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --user-bubble: #e0e7ff;
            --bot-bubble: #ffffff;
            --input-bg: #ffffff;
            --input-border: #cbd5e1;
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(30, 41, 59, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #6366f1;
            --primary-hover: #818cf8;
            --user-bubble: #3730a3;
            --bot-bubble: #1e293b;
            --input-bg: #0f172a;
            --input-border: #334155;
        }

        /* --- STYLING DASAR --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: var(--bg-gradient);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            color: var(--text-main); transition: background 0.4s ease;
        }

        /* --- KOTAK CHAT (GLASSMORPHISM) --- */
        .chat-container {
            width: 100%; max-width: 700px; height: 92vh;
            background: var(--glass-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            display: flex; flex-direction: column; overflow: hidden;
            transition: all 0.4s ease;
        }

        /* --- HEADER --- */
        .chat-header {
            padding: 20px; border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-title { font-size: 1.25rem; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .header-actions { display: flex; gap: 10px; }
        .icon-btn {
            background: transparent; border: 1px solid var(--glass-border); color: var(--text-main);
            font-size: 1.2rem; cursor: pointer; border-radius: 50%; width: 40px; height: 40px;
            display: flex; justify-content: center; align-items: center; transition: all 0.2s;
        }
        .icon-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- AREA PESAN --- */
        #chat-box {
            flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
            scroll-behavior: smooth;
        }
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }

        /* --- ANIMASI PESAN --- */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-wrapper { display: flex; max-width: 85%; animation: slideUpFade 0.3s ease forwards; gap: 12px; }
        .msg-wrapper.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-wrapper.bot { align-self: flex-start; }

        .avatar {
            width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem; background: var(--primary); color: white; flex-shrink: 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .user .avatar { background: #10b981; }

        .msg-content { display: flex; flex-direction: column; }
        .user .msg-content { align-items: flex-end; }
        
        .sender-name { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }

        .msg-bubble {
            padding: 14px 18px; border-radius: 18px; line-height: 1.6; word-wrap: break-word; font-size: 0.95rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .user .msg-bubble { background-color: var(--user-bubble); border-top-right-radius: 4px; color: var(--text-main); }
        .bot .msg-bubble { background-color: var(--bot-bubble); border-top-left-radius: 4px; border: 1px solid var(--glass-border); }

        /* Markdown Styling untuk Bot */
        .bot .msg-bubble p { margin-bottom: 10px; }
        .bot .msg-bubble p:last-child { margin-bottom: 0; }
        .bot .msg-bubble pre { background: #1e293b; color: #f8fafc; padding: 12px; border-radius: 8px; overflow-x: auto; margin-top: 8px; }
        .bot .msg-bubble code { background: rgba(128,128,128,0.2); padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        .bot .msg-bubble ul, .bot .msg-bubble ol { margin-left: 20px; margin-bottom: 10px; }

        /* --- AREA INPUT --- */
        .chat-input-area { padding: 20px; border-top: 1px solid var(--glass-border); display: flex; gap: 12px; }
        input[type="text"] {
            flex: 1; padding: 14px 20px; background: var(--input-bg); color: var(--text-main);
            border: 1px solid var(--input-border); border-radius: 30px; font-size: 1rem; outline: none;
            transition: all 0.3s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2); }
        input[type="text"]::placeholder { color: var(--text-muted); }

        .send-btn {
            background-color: var(--primary); color: white; border: none; border-radius: 30px; padding: 0 24px;
            font-weight: bold; font-size: 1rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px;
        }
        .send-btn:hover { background-color: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3); }

        .loading {
            font-style: italic; color: var(--text-muted); font-size: 0.9rem; margin-left: 60px;
            display: none; align-items: center; gap: 8px;
        }
        .dot-pulse { display: inline-flex; gap: 4px; }
        .dot-pulse span { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: pulse 1.4s infinite ease-in-out both; }
        .dot-pulse span:nth-child(1) { animation-delay: -0.32s; }
        .dot-pulse span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes pulse { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="header-title">
                <span style="font-size: 1.5rem;">✨</span> Gemini AI
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="clear-btn" title="Hapus Riwayat Chat">🗑️</button>
                <button class="icon-btn" id="theme-btn" title="Ganti Tema">🌙</button>
            </div>
        </div>
        
        <div id="chat-box"></div>
        
        <div id="loading-indicator" class="loading">
            Gemini sedang berpikir <div class="dot-pulse"><span></span><span></span><span></span></div>
        </div>

        <form id="chat-form" class="chat-input-area">
            <input type="text" id="message" placeholder="Ketik sesuatu ke Gemini..." required autocomplete="off">
            <button type="submit" class="send-btn">Kirim 🚀</button>
        </form>
    </div>

    <script>
        // PENTING: Ganti IP di bawah ini dengan IP Address laptop Ubuntu temen lu!
        const GO_SERVER_URL = "http://192.168.1.15:8080/api/chat"; 

        // DOM Elements
        const chatBox = document.getElementById('chat-box');
        const form = document.getElementById('chat-form');
        const messageInput = document.getElementById('message');
        const loadingIndicator = document.getElementById('loading-indicator');
        const themeBtn = document.getElementById('theme-btn');
        const clearBtn = document.getElementById('clear-btn');

        // --- SISTEM DARK MODE ---
        let isDarkMode = localStorage.getItem('darkMode') === 'true';
        
        function applyTheme() {
            if (isDarkMode) {
                document.body.setAttribute('data-theme', 'dark');
                themeBtn.innerText = '☀️';
            } else {
                document.body.removeAttribute('data-theme');
                themeBtn.innerText = '🌙';
            }
        }
        
        themeBtn.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            localStorage.setItem('darkMode', isDarkMode);
            applyTheme();
        });
        
        applyTheme(); // Terapkan tema saat pertama kali load

        // --- SISTEM RIWAYAT CHAT (LOCAL STORAGE) ---
        // Array untuk menyimpan semua pesan
        let chatHistory = JSON.parse(localStorage.getItem('geminiChatHistory')) || [];

        // Fungsi untuk merender 1 pesan ke layar HTML
        function renderMessage(sender, text, isBot) {
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${isBot ? 'bot' : 'user'}`;
            
            // Buat Avatar (Robot untuk bot, Orang untuk user)
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerText = isBot ? '🤖' : '👤';

            // Kontainer isi pesan
            const content = document.createElement('div');
            content.className = 'msg-content';

            const nameSpan = document.createElement('span');
            nameSpan.className = 'sender-name';
            nameSpan.innerText = sender;

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            
            // Format Markdown kalau dari bot
            if (isBot) {
                bubble.innerHTML = marked.parse(text);
            } else {
                bubble.innerText = text;
            }

            content.appendChild(nameSpan);
            content.appendChild(bubble);
            
            wrapper.appendChild(avatar);
            wrapper.appendChild(content);
            chatBox.appendChild(wrapper);
            
            // Scroll otomatis ke paling bawah
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        // Fungsi untuk merender ulang seluruh isi chat dari localStorage
        function loadChatHistory() {
            chatBox.innerHTML = ''; // Bersihkan layar dulu
            if (chatHistory.length === 0) {
                // Pesan pembuka default jika riwayat kosong
                renderMessage('Gemini', 'Halo! Chatbot Qapid disini. Ada yang mau diobrolin?', true);
            } else {
                chatHistory.forEach(msg => renderMessage(msg.sender, msg.text, msg.isBot));
            }
        }

        // Jalankan saat halaman pertama kali dibuka (refresh)
        loadChatHistory();

        // --- TOMBOL HAPUS RIWAYAT ---
        clearBtn.addEventListener('click', () => {
            if (confirm("Yakin ingin menghapus semua riwayat chat?")) {
                chatHistory = [];
                localStorage.removeItem('geminiChatHistory');
                loadChatHistory();
            }
        });

        // --- LOGIKA MENGIRIM PESAN ---
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = messageInput.value.trim();
            if (!message) return;

            // 1. Simpan ke array & LocalStorage, lalu tampilkan
            chatHistory.push({ sender: 'Anda', text: message, isBot: false });
            localStorage.setItem('geminiChatHistory', JSON.stringify(chatHistory));
            renderMessage('Anda', message, false);
            
            messageInput.value = '';
            loadingIndicator.style.display = 'flex';
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });

            try {
                // 2. Tembak API Server Go
                const response = await fetch(GO_SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                if (!response.ok) throw new Error("Gagal respon dari server");
                const data = await response.json();
                
                loadingIndicator.style.display = 'none';

                // 3. Simpan balasan bot ke array & LocalStorage, lalu tampilkan
                chatHistory.push({ sender: 'Gemini', text: data.reply, isBot: true });
                localStorage.setItem('geminiChatHistory', JSON.stringify(chatHistory));
                renderMessage('Gemini', data.reply, true);

            } catch (error) {
                loadingIndicator.style.display = 'none';
                const errorMsg = '**Error:** Gagal terhubung ke server Go. Cek apakah IP Address sudah benar di kode, dan pastikan server teman lu sedang menyala.';
                
                chatHistory.push({ sender: 'Sistem', text: errorMsg, isBot: true });
                localStorage.setItem('geminiChatHistory', JSON.stringify(chatHistory));
                renderMessage('Sistem', errorMsg, true);
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
